<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FamilyAffairs — /approvals</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:#1a1612;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 24px;gap:48px;flex-wrap:wrap;
}
::-webkit-scrollbar{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}
@keyframes slideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-60px)}}
@keyframes pop{0%{transform:scale(0.7);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(80px) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

const T = {
  household:'#2cb5a0', mustDo:'#f06449', ongoing:'#4a90d9',
  challenge:'#f5a623', baseline:'#9099a6', event:'#8b5cf6',
  householdBg:'#e8f8f6', mustDoBg:'#fdf0ed', ongoingBg:'#eaf3fc',
  challengeBg:'#fef6e8', baselineBg:'#f2f3f5',
  bg:'#f5f2ee', surface:'#ffffff', surf2:'#f0ece6',
  text:'#1e1a16', text2:'#6b6460', text3:'#9e9a96', border:'#e4dfd8',
  avatars:['#e85d75','#f5a623','#2cb5a0','#4a90d9','#8b5cf6','#f06449'],
};

const TYPES = {
  household:{label:'Домашно', color:T.household, bg:T.householdBg, icon:'🏠'},
  must_do:  {label:'Must‑do', color:T.mustDo,    bg:T.mustDoBg,    icon:'📋'},
  ongoing:  {label:'Ежедневно',color:T.ongoing,  bg:T.ongoingBg,   icon:'🔄'},
  challenge:{label:'Предизвик.',color:T.challenge,bg:T.challengeBg, icon:'⚡'},
  baseline: {label:'Базово',  color:T.baseline,  bg:T.baselineBg,  icon:'📌'},
};

const REWARD_LABEL = {none:'—', fixed:'Фиксирана', choice:'Избор', mystery:'🎁 Мистерия'};

const MEMBERS = [
  {name:'Мама',  init:'М', color:T.avatars[0]},
  {name:'Петко', init:'П', color:T.avatars[1]},
  {name:'Елена', init:'Е', color:T.avatars[2]},
  {name:'Иван',  init:'И', color:T.avatars[3]},
];

const INITIAL_TASKS = [
  {id:1, title:'Домашно по математика', type:'must_do',   assignee:2, pts:20, streak:7,  multiplier:1.5, reward:'mystery', due:'Днес 17:43', claimedAgo:'преди 12 мин'},
  {id:2, title:'Пране + прибиране',     type:'household', assignee:0, pts:20, streak:2,  multiplier:1.0, reward:'fixed',   due:'Утре',       claimedAgo:'преди 35 мин'},
  {id:3, title:'Сутрешен спорт',        type:'challenge', assignee:1, pts:25, streak:14, multiplier:2.0, reward:'choice',  due:'Всеки ден',  claimedAgo:'преди 1 ч'},
  {id:4, title:'Изчисти кухнята',       type:'household', assignee:2, pts:15, streak:0,  multiplier:1.0, reward:'none',    due:'Днес',       claimedAgo:'преди 2 ч'},
  {id:5, title:'Четене 20 мин',         type:'ongoing',   assignee:3, pts:10, streak:5,  multiplier:1.5, reward:'fixed',   due:'Утре',       claimedAgo:'преди 3 ч'},
];

// ── Micro ─────────────────────────────────────────────────────────────────

const Av = ({m, size=36}) => (
  <div style={{
    width:size,height:size,borderRadius:'50%',background:m.color,
    display:'flex',alignItems:'center',justifyContent:'center',
    color:'#fff',fontSize:size*0.38,fontWeight:700,fontFamily:'Nunito,sans-serif',
    flexShrink:0,
  }}>{m.init}</div>
);

const Pill = ({color,bg,children,small}) => (
  <span style={{
    display:'inline-flex',alignItems:'center',
    background:bg||color+'18',color,border:`1px solid ${color}30`,
    borderRadius:99,padding:small?'2px 7px':'3px 10px',
    fontSize:small?10:11,fontWeight:600,
  }}>{children}</span>
);

const Confetti = () => {
  const colors=[T.challenge,T.mustDo,T.household,T.ongoing,T.event,'#e85d75'];
  return (
    <div style={{position:'fixed',top:0,left:0,right:0,height:140,overflow:'hidden',pointerEvents:'none',zIndex:100}}>
      {Array.from({length:22},(_,i)=>(
        <div key={i} style={{
          position:'absolute',top:-10,left:`${5+(i*4.2)%90}%`,
          width:5+(i%3)*3,height:5+(i%3)*3,
          borderRadius:i%3===0?'50%':2,
          background:colors[i%colors.length],
          animation:`confetti ${0.9+i*0.04}s ${i*0.05}s ease-out forwards`,
        }}/>
      ))}
    </div>
  );
};

// ── Approval Card ─────────────────────────────────────────────────────────

const ApprovalCard = ({task, onApprove, onReject, style}) => {
  const tp = TYPES[task.type];
  const m  = MEMBERS[task.assignee];
  const finalPts = Math.round(task.pts * task.multiplier);

  return (
    <div style={{
      background:T.surface,borderRadius:16,
      border:`1px solid ${T.border}`,
      boxShadow:'0 2px 8px rgba(0,0,0,0.06)',
      overflow:'hidden',
      animation:'fadeUp 0.25s ease-out',
      ...style,
    }}>
      {/* Color top bar */}
      <div style={{height:4,background:`linear-gradient(90deg,${tp.color},${tp.color}80)`}}/>

      <div style={{padding:'14px 14px 10px'}}>
        {/* Header row */}
        <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10}}>
          <Av m={m} size={40}/>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
              <span style={{fontSize:13,fontWeight:700,color:T.text}}>{m.name}</span>
              <span style={{fontSize:11,color:T.text3}}>·</span>
              <span style={{fontSize:11,color:T.text3}}>{task.claimedAgo}</span>
            </div>
            <div style={{fontSize:15,fontWeight:800,color:T.text,fontFamily:'Nunito,sans-serif',lineHeight:1.3}}>
              {task.title}
            </div>
          </div>
        </div>

        {/* Tags row */}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
          <Pill color={tp.color} bg={tp.bg} small>{tp.icon} {tp.label}</Pill>
          {task.streak>=3 && (
            <Pill color='#c77700' bg='#fff3e0' small>🔥 {task.streak} дни</Pill>
          )}
          <Pill color={T.event} bg='#f3effe' small>{REWARD_LABEL[task.reward]}</Pill>
          <span style={{fontSize:11,color:T.text3,alignSelf:'center'}}>📅 {task.due}</span>
        </div>

        {/* Points preview */}
        <div style={{
          background:T.challengeBg,borderRadius:10,
          padding:'8px 12px',marginBottom:12,
          display:'flex',alignItems:'center',justifyContent:'space-between',
        }}>
          <div style={{fontSize:11,color:T.text2}}>
            {task.pts} т.
            {task.multiplier>1 && (
              <span style={{color:T.challenge,fontWeight:700}}> × {task.multiplier} streak</span>
            )}
          </div>
          <div style={{fontSize:16,fontWeight:900,color:T.challenge,fontFamily:'Nunito,sans-serif',display:'flex',alignItems:'center',gap:4}}>
            ⭐ {finalPts} точки
          </div>
        </div>

        {/* Action buttons */}
        <div style={{display:'flex',gap:8}}>
          <div onClick={()=>onReject(task.id)} style={{
            flex:1,padding:'10px',borderRadius:10,
            background:T.mustDoBg,border:`1.5px solid ${T.mustDo}40`,
            display:'flex',alignItems:'center',justifyContent:'center',gap:5,
            cursor:'pointer',
          }}>
            <span style={{fontSize:15}}>✕</span>
            <span style={{fontSize:13,fontWeight:700,color:T.mustDo}}>Отхвърли</span>
          </div>
          <div onClick={()=>onApprove(task.id)} style={{
            flex:2,padding:'10px',borderRadius:10,
            background:T.household,
            display:'flex',alignItems:'center',justifyContent:'center',gap:5,
            cursor:'pointer',
            boxShadow:`0 3px 10px ${T.household}40`,
          }}>
            <span style={{fontSize:15,color:'#fff'}}>✓</span>
            <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>Одобри</span>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Empty state ────────────────────────────────────────────────────────────

const EmptyState = () => (
  <div style={{
    flex:1,display:'flex',flexDirection:'column',alignItems:'center',
    justifyContent:'center',padding:'48px 32px',textAlign:'center',
    animation:'pop 0.4s cubic-bezier(.2,.7,.3,1)',
  }}>
    <div style={{fontSize:56,marginBottom:16}}>🎉</div>
    <div style={{fontSize:20,fontWeight:900,color:T.text,fontFamily:'Nunito,sans-serif',marginBottom:8}}>
      Всичко одобрено!
    </div>
    <div style={{fontSize:13,color:T.text2,lineHeight:1.6,maxWidth:240}}>
      Нямаш чакащи задачи за одобрение. Семейството работи отлично.
    </div>
    <div style={{
      marginTop:20,background:T.challengeBg,borderRadius:99,
      padding:'8px 18px',fontSize:12,fontWeight:600,color:T.challenge,
      display:'flex',alignItems:'center',gap:6,
    }}>⭐ Одобрени днес: 3 задачи</div>
  </div>
);

// ════════════════════════════════════════════════════════════════════════════
// VARIATION A — Queue list с bulk actions
// ════════════════════════════════════════════════════════════════════════════

const VariantA = () => {
  const [tasks, setTasks] = React.useState(INITIAL_TASKS);
  const [processed, setProcessed] = React.useState([]);
  const [showConfetti, setShowConfetti] = React.useState(false);
  const [animatingId, setAnimatingId] = React.useState(null);
  const [animDir, setAnimDir] = React.useState('right');

  const approve = (id) => {
    setAnimDir('right');
    setAnimatingId(id);
    if(tasks.length===1){ setShowConfetti(true); setTimeout(()=>setShowConfetti(false),1400); }
    setTimeout(()=>{
      setTasks(t=>t.filter(x=>x.id!==id));
      setProcessed(p=>[...p,{id,action:'approved'}]);
      setAnimatingId(null);
    },280);
  };

  const reject = (id) => {
    setAnimDir('left');
    setAnimatingId(id);
    setTimeout(()=>{
      setTasks(t=>t.filter(x=>x.id!==id));
      setProcessed(p=>[...p,{id,action:'rejected'}]);
      setAnimatingId(null);
    },280);
  };

  const approveAll = () => {
    if(!tasks.length) return;
    const ids = [...tasks.map(t=>t.id)];
    setShowConfetti(true);
    setTimeout(()=>setShowConfetti(false),1400);
    ids.forEach((id,i)=>{
      setTimeout(()=>{
        setTasks(t=>t.filter(x=>x.id!==id));
        setProcessed(p=>[...p,{id,action:'approved'}]);
      }, i*120);
    });
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.bg,fontFamily:'DM Sans,sans-serif',overflow:'hidden',position:'relative'}}>
      {showConfetti && <Confetti/>}

      {/* Header */}
      <div style={{background:'#fff',borderBottom:`1px solid ${T.border}`,padding:'10px 16px 12px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}}>
          <div>
            <div style={{fontSize:10,fontWeight:600,color:T.text3,letterSpacing:'0.08em',textTransform:'uppercase'}}>Родителски панел</div>
            <div style={{fontSize:18,fontWeight:800,color:T.text,fontFamily:'Nunito,sans-serif',display:'flex',alignItems:'center',gap:8}}>
              Одобрения
              {tasks.length>0 && (
                <span style={{
                  background:T.mustDo,color:'#fff',
                  borderRadius:99,padding:'1px 9px',
                  fontSize:14,fontWeight:800,fontFamily:'Nunito,sans-serif',
                }}>{tasks.length}</span>
              )}
            </div>
          </div>
          {tasks.length>1 && (
            <div onClick={approveAll} style={{
              background:T.household,borderRadius:10,
              padding:'7px 14px',cursor:'pointer',
              boxShadow:`0 2px 8px ${T.household}40`,
            }}>
              <span style={{fontSize:12,fontWeight:700,color:'#fff'}}>✓ Одобри всички</span>
            </div>
          )}
        </div>

        {/* Processed summary */}
        {processed.length>0 && (
          <div style={{
            display:'flex',gap:8,marginTop:10,
            padding:'6px 10px',background:T.surf2,borderRadius:8,
            fontSize:11,color:T.text2,
          }}>
            <span>Днес: </span>
            <span style={{color:T.household,fontWeight:600}}>✓ {processed.filter(p=>p.action==='approved').length} одобрени</span>
            {processed.filter(p=>p.action==='rejected').length>0 && (
              <span style={{color:T.mustDo,fontWeight:600}}>✕ {processed.filter(p=>p.action==='rejected').length} отхвърлени</span>
            )}
          </div>
        )}
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
        {tasks.length===0
          ? <EmptyState/>
          : tasks.map(task=>(
            <div key={task.id} style={{
              animation: animatingId===task.id
                ? (animDir==='right' ? 'slideOut 0.28s ease-in forwards' : 'slideOutLeft 0.28s ease-in forwards')
                : 'none',
            }}>
              <ApprovalCard task={task} onApprove={approve} onReject={reject}/>
            </div>
          ))
        }
        <div style={{height:20}}/>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════════════════════
// VARIATION B — Swipe cards (one at a time, tinder-style)
// ════════════════════════════════════════════════════════════════════════════

const VariantB = () => {
  const [tasks, setTasks] = React.useState(INITIAL_TASKS);
  const [processed, setProcessed] = React.useState([]);
  const [action, setAction] = React.useState(null); // 'approve' | 'reject' | null
  const [showConfetti, setShowConfetti] = React.useState(false);

  const current = tasks[0];
  const next    = tasks[1];

  const handle = (act) => {
    setAction(act);
    if(tasks.length===1 && act==='approve'){
      setShowConfetti(true);
      setTimeout(()=>setShowConfetti(false),1400);
    }
    setTimeout(()=>{
      setTasks(t=>t.slice(1));
      setProcessed(p=>[...p,{id:current.id,action:act}]);
      setAction(null);
    },300);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.bg,fontFamily:'DM Sans,sans-serif',overflow:'hidden',position:'relative'}}>
      {showConfetti && <Confetti/>}

      {/* Header */}
      <div style={{background:'#fff',borderBottom:`1px solid ${T.border}`,padding:'10px 16px 12px',flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:600,color:T.text3,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:2}}>Родителски панел</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:18,fontWeight:800,color:T.text,fontFamily:'Nunito,sans-serif'}}>
            Одобрения
          </div>
          {tasks.length>0 && (
            <div style={{
              display:'flex',alignItems:'center',gap:4,
              background:T.mustDoBg,borderRadius:99,padding:'4px 10px',
            }}>
              <span style={{fontSize:12,color:T.mustDo,fontWeight:700}}>{tasks.length} чакат</span>
            </div>
          )}
        </div>

        {/* Progress dots */}
        {INITIAL_TASKS.length>0 && (
          <div style={{display:'flex',gap:5,marginTop:10}}>
            {INITIAL_TASKS.map((_,i)=>{
              const done = i < (INITIAL_TASKS.length-tasks.length);
              const current_i = i === (INITIAL_TASKS.length-tasks.length);
              return (
                <div key={i} style={{
                  flex:1,height:4,borderRadius:99,
                  background: done ? T.household : current_i ? T.challenge : T.border,
                  transition:'background 0.3s',
                }}/>
              );
            })}
          </div>
        )}
      </div>

      {/* Card stack area */}
      <div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 16px 0',position:'relative'}}>
        {tasks.length===0
          ? <EmptyState/>
          : (
            <>
              {/* Ghost card behind */}
              {next && (
                <div style={{
                  position:'absolute',top:28,left:28,right:28,
                  background:'#fff',borderRadius:16,border:`1px solid ${T.border}`,
                  height:300,opacity:0.5,transform:'scale(0.96)',
                }}/>
              )}

              {/* Current card */}
              <div style={{
                position:'relative',zIndex:2,
                animation: action==='approve'
                  ? 'slideOut 0.3s ease-in forwards'
                  : action==='reject'
                  ? 'slideOutLeft 0.3s ease-in forwards'
                  : 'fadeUp 0.3s ease-out',
              }}>
                <ApprovalCard task={current} onApprove={()=>handle('approve')} onReject={()=>handle('reject')}/>
              </div>

              {/* Counter */}
              <div style={{textAlign:'center',marginTop:14,fontSize:12,color:T.text3,fontWeight:500}}>
                {INITIAL_TASKS.length-tasks.length+1} от {INITIAL_TASKS.length}
              </div>
            </>
          )
        }
      </div>

      {/* History strip */}
      {processed.length>0 && (
        <div style={{
          padding:'10px 16px 14px',background:'#fff',
          borderTop:`1px solid ${T.border}`,flexShrink:0,
        }}>
          <div style={{fontSize:10,fontWeight:700,color:T.text3,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>
            Обработени
          </div>
          <div style={{display:'flex',gap:6,overflowX:'auto'}}>
            {processed.map((p,i)=>{
              const t = INITIAL_TASKS.find(x=>x.id===p.id);
              const m = MEMBERS[t.assignee];
              return (
                <div key={i} style={{
                  display:'flex',alignItems:'center',gap:5,flexShrink:0,
                  background:p.action==='approved'?T.householdBg:T.mustDoBg,
                  borderRadius:99,padding:'4px 10px 4px 6px',
                  border:`1px solid ${p.action==='approved'?T.household+'30':T.mustDo+'30'}`,
                }}>
                  <div style={{
                    width:20,height:20,borderRadius:'50%',background:m.color,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:10,fontWeight:700,color:'#fff',fontFamily:'Nunito,sans-serif',
                  }}>{m.init}</div>
                  <span style={{fontSize:10,fontWeight:600,color:p.action==='approved'?T.household:T.mustDo}}>
                    {p.action==='approved'?'✓':'✕'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────

const App = () => (
  <DesignCanvas>
    <DCSection id="approvals" title="/approvals — Pending approvals" subtitle="Mobile · Parent only · Интерактивен">
      <DCArtboard id="queue" label="A · Queue list + Одобри всички" width={375} height={780}>
        <VariantA/>
      </DCArtboard>
      <DCArtboard id="stack" label="B · Card stack (едно по едно)" width={375} height={780}>
        <VariantB/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
